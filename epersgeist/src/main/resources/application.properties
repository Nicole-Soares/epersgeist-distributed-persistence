# PostgreSQL Connector
spring.datasource.url=jdbc:postgresql://localhost:5432/epersgeist
spring.datasource.username=postgres
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# DDL generation PostgreSQL
spring.jpa.generate-ddl=true
spring.jpa.show-sql=true

# Neo4J Connector
spring.neo4j.uri=${NEO_URL:bolt://localhost:7687}
spring.neo4j.authentication.username=${NEO_USER:neo4j}
spring.neo4j.authentication.password=${NEO_PASSWORD:rootroot}

# MongoDB Configuration
spring.data.mongodb.uri=mongodb://localhost:27017/epersgeist
spring.data.mongodb.database=epersgeist
logging.level.org.springframework.data.mongodb.core.MongoTemplate=DEBUG

# DDL generation Neo4J
logging.level.org.springframework.data.neo4j=DEBUG

#Others
spring.jackson.deserialization.fail-on-unknown-properties=true

# Kafka Configuration
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP:kafka1:9092,kafka2:9093}
spring.kafka.consumer.group-id=mi-grupo
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer